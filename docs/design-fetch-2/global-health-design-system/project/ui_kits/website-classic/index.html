<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global Health · Website UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/logo/global-health-logo.png">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--surface); font-family: var(--font-body); color: var(--fg2); }
  *, *::before, *::after { box-sizing: border-box; }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; }
  /* Responsive layout — desktop nav vs mobile drawer */
  .desktop-only { display: inline-flex; }
  .mobile-only  { display: none; }
  @media (max-width: 900px) {
    .desktop-only { display: none !important; }
    .mobile-only  { display: inline-flex !important; }
  }
  /* Hero / section grid: stack on mobile, 2-col on desktop */
  @media (min-width: 1000px) {
    .hero-grid    { grid-template-columns: 1.08fr 0.92fr !important; }
    .hero-card    { justify-self: end !important; }
    .doctor-grid  { grid-template-columns: 0.9fr 1.1fr !important; }
    .about-grid   { grid-template-columns: 1fr 1fr !important; }
    .how-grid     { grid-template-columns: 0.95fr 1.05fr !important; align-items: center; }
    .footer-grid  { grid-template-columns: 1.6fr repeat(4, 1fr) !important; }
  }
  @media (max-width: 999px) {
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 600px) {
    .footer-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<!-- Components in order of dependency -->
<script type="text/babel" src="Components.jsx"   data-presets="env,react"></script>
<script type="text/babel" src="Header.jsx"       data-presets="env,react"></script>
<script type="text/babel" src="HomeHero.jsx"     data-presets="env,react"></script>
<script type="text/babel" src="Sections.jsx"     data-presets="env,react"></script>
<script type="text/babel" src="CountryHome.jsx"  data-presets="env,react"></script>
<script type="text/babel" src="BookingModal.jsx" data-presets="env,react"></script>
<script type="text/babel" src="App.jsx"          data-presets="env,react"></script>
</body>
</html>
