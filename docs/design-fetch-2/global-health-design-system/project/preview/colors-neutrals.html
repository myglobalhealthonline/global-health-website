<!doctype html><html><head><meta charset="utf-8"><title>Neutrals & Text</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .swatch { flex: 1 1 0; border-radius: 14px; padding: 14px 16px; min-height: 110px; display: flex; flex-direction: column; justify-content: flex-end; box-shadow: var(--shadow-soft); border: 1px solid var(--border); }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1.2; }
  .swatch .hex { font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .swatch .var { font-family: ui-monospace, monospace; font-size: 10px; opacity: 0.7; margin-top: 6px; }
</style>
<div class="row" style="gap: 12px;">
  <div class="swatch" style="background:#0F2E25;color:#fff"><div class="name">Ink — fg1</div><div class="hex">#0F2E25</div><div class="var">headings</div></div>
  <div class="swatch" style="background:#2D3B36;color:#fff"><div class="name">Body — fg2</div><div class="hex">#2D3B36</div><div class="var">paragraph</div></div>
  <div class="swatch" style="background:#5A6B64;color:#fff"><div class="name">Muted — fg3</div><div class="hex">#5A6B64</div><div class="var">caption, secondary</div></div>
  <div class="swatch" style="background:#8A9A92;color:#fff"><div class="name">Placeholder</div><div class="hex">#8A9A92</div><div class="var">--gh-placeholder</div></div>
  <div class="swatch" style="background:#D8E0D8"><div class="name">Border</div><div class="hex">#D8E0D8</div><div class="var">--gh-border</div></div>
  <div class="swatch" style="background:#FFFFFF"><div class="name">White</div><div class="hex">#FFFFFF</div><div class="var">surface</div></div>
</div>
</body></html>
