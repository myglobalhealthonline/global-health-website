<!doctype html><html><head><meta charset="utf-8"><title>Brand Primary Greens</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .swatch { flex: 1 1 0; border-radius: 14px; padding: 14px 16px; min-height: 110px; display: flex; flex-direction: column; justify-content: flex-end; box-shadow: var(--shadow-soft); }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1.2; }
  .swatch .hex { font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .swatch .var { font-family: ui-monospace, monospace; font-size: 10px; opacity: 0.7; margin-top: 6px; }
</style>
<div class="row" style="gap: 12px;">
  <div class="swatch" style="background:#1D4B36;color:#fff"><div class="name">Forest</div><div class="hex">#1D4B36</div><div class="var">--gh-forest</div></div>
  <div class="swatch" style="background:#1B4D3E;color:#fff"><div class="name">Forest deep</div><div class="hex">#1B4D3E</div><div class="var">--gh-forest-deep • brand</div></div>
  <div class="swatch" style="background:#143B30;color:#fff"><div class="name">Forest darker</div><div class="hex">#143B30</div><div class="var">--gh-forest-darker • hover</div></div>
  <div class="swatch" style="background:#0F2E25;color:#fff"><div class="name">Forest night</div><div class="hex">#0F2E25</div><div class="var">--gh-forest-night • dark bg</div></div>
</div>
</body></html>
