<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global Health · Admin Portal — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/logo/global-health-logo.png">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--surface-soft);
    color: var(--fg2);
    font-family: var(--font-body);
  }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; }
  /* Hide the sidebar's country-scoped section a bit cleaner on narrow widths */
  @media (max-width: 1100px) {
    .admin-main { padding: 24px 18px 48px !important; }
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0F2E25"/>
  <rect x="60" y="60" width="80" height="80" rx="14" fill="#C8E6A0"/>
  <text x="100" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" text-anchor="middle" fill="#1B4D3E" letter-spacing="-0.04em">GH</text>
</svg>
</template>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<!-- In dependency order -->
<script type="text/babel" src="Atoms.jsx"     data-presets="env,react"></script>
<script type="text/babel" src="Shell.jsx"     data-presets="env,react"></script>
<script type="text/babel" src="Screens1.jsx"  data-presets="env,react"></script>
<script type="text/babel" src="Screens2.jsx"  data-presets="env,react"></script>
<script type="text/babel" src="Screens3.jsx"  data-presets="env,react"></script>
<script type="text/babel" src="App.jsx"       data-presets="env,react"></script>
</body>
</html>
