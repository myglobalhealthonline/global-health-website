<!doctype html><html><head><meta charset="utf-8"><title>Accents & Lime</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .swatch { flex: 1 1 0; border-radius: 14px; padding: 14px 16px; min-height: 110px; display: flex; flex-direction: column; justify-content: flex-end; box-shadow: var(--shadow-soft); border: 1px solid var(--border); }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1.2; }
  .swatch .hex { font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .swatch .var { font-family: ui-monospace, monospace; font-size: 10px; opacity: 0.7; margin-top: 6px; }
</style>
<div class="row" style="gap: 12px;">
  <div class="swatch" style="background:#B0F122;color:#143B30"><div class="name">Lime</div><div class="hex">#B0F122</div><div class="var">--gh-lime • marketing</div></div>
  <div class="swatch" style="background:#8FB021;color:#fff"><div class="name">Olive</div><div class="hex">#8FB021</div><div class="var">--gh-olive • logo globe</div></div>
  <div class="swatch" style="background:#C8E6A0;color:#1B4D3E"><div class="name">Mint soft</div><div class="hex">#C8E6A0</div><div class="var">--gh-mint-soft • UI</div></div>
  <div class="swatch" style="background:#F4F8F4;color:#1B4D3E"><div class="name">Cream</div><div class="hex">#F4F8F4</div><div class="var">--gh-cream • soft bg</div></div>
  <div class="swatch" style="background:#EDF2ED;color:#1B4D3E"><div class="name">Panel</div><div class="hex">#EDF2ED</div><div class="var">--gh-panel</div></div>
</div>
</body></html>
