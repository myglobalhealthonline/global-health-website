# Railway / Nixpacks — monorepo root. Set service Root Directory to repo root (empty / `/`)
# so `pnpm-lock.yaml` and `pnpm-workspace.yaml` are present for frozen install.
[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile --prefer-offline"]

[phases.build]
cmds = ["pnpm --filter @gh/web build"]
