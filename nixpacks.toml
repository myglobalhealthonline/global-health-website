# Railway / Nixpacks — monorepo root. Set service Root Directory to repo root (empty / `/`).
# Railway sets CI=true; pnpm then defaults to frozen lockfile. Unset CI so a present lockfile still works
# if it was briefly out of sync, and isolated-package edge cases don’t hard-fail.
# Frontend-only services should use Root Directory = `frontend` + `frontend/railway.toml` instead.
[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["sh -c 'unset CI; pnpm install'"]

[phases.build]
cmds = ["pnpm --filter frontend build"]
