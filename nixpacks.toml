# Railway / Nixpacks (monorepo): workspace install + Next.js frontend build.
# Use repo root as the service **Root Directory** so this file is picked up.
# Set **Start Command** in Railway to: `pnpm --filter frontend start` (Next listens on `$PORT` when set).
[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter frontend build"]
