<!doctype html><html><head><meta charset="utf-8"><title>Display Type</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 24px 28px; }
  .display { font-family: var(--font-display); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: var(--fg1); font-size: 56px; }
  .display .accent { color: var(--brand); }
  .meta { display: flex; gap: 16px; margin-top: 10px; font-family: ui-monospace, monospace; font-size: 11px; color: var(--fg3); }
  .meta span strong { color: var(--fg2); }
</style>
<div class="display">Medicine without<br><span class="accent">borders.</span></div>
<div class="meta">
  <span><strong>Plus Jakarta Sans</strong></span>
  <span>800 / clamp(2.5–4rem)</span>
  <span>line-height 1.05</span>
  <span>tracking −0.03em</span>
</div>
</body></html>
