<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 28px 24px; background: #fff; }
  .row { gap: 32px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 110px; height: 70px; background: #fff; border-radius: 16px; border: 1px solid #D8E0D8; }
  .box.s1 { box-shadow: 0 1px 3px rgba(15,46,37,0.06); }
  .box.s2 { box-shadow: 0 1px 3px rgba(15,46,37,0.08), 0 4px 12px rgba(15,46,37,0.04); }
  .box.s3 { box-shadow: 0 4px 12px rgba(15,46,37,0.12), 0 8px 24px rgba(15,46,37,0.08); }
  .box.s4 { box-shadow: 0 8px 30px rgba(15,46,37,0.14), 0 2px 8px rgba(15,46,37,0.08); }
  .tile .name { font-size: 11px; font-weight: 700; color: var(--fg2); }
  .tile .meta { font-family: ui-monospace, monospace; font-size: 10px; color: var(--fg3); }
</style>
<div class="row">
  <div class="tile"><div class="box s1"></div><div class="name">soft</div><div class="meta">1·3 / 0.06</div></div>
  <div class="tile"><div class="box s2"></div><div class="name">card</div><div class="meta">1·3 + 4·12</div></div>
  <div class="tile"><div class="box s3"></div><div class="name">card-hover</div><div class="meta">4·12 + 8·24</div></div>
  <div class="tile"><div class="box s4"></div><div class="name">elevated</div><div class="meta">8·30 + 2·8</div></div>
</div>
<div style="margin-top: 12px; font-family: ui-monospace, monospace; font-size: 10px; color: var(--fg3); text-align: center;">Shadows are <strong style="color:#1B4D3E">tinted forest-green</strong> — never neutral black. Hover lifts soft → card → card-hover.</div>
</body></html>
