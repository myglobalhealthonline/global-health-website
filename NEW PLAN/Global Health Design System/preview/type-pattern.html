<!doctype html><html><head><meta charset="utf-8"><title>Eyebrow + Heading Pattern</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 28px 30px; }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #1B4D3E; }
  .h2 { font-family: var(--font-display); font-size: 36px; font-weight: 800; line-height: 1.15; letter-spacing: -0.015em; color: #0F2E25; margin: 8px 0 6px; }
  .lede { font-size: 18px; line-height: 1.55; color: #5A6B64; max-width: 38em; font-family: var(--font-body); }
  .note { margin-top: 16px; font-size: 11px; font-family: ui-monospace, monospace; color: var(--fg3); }
</style>
<div class="eyebrow">Specialties</div>
<div class="h2">Care for the conditions that matter most</div>
<div class="lede">Book a video consultation with licensed doctors across general practice, cardiology, dermatology, and mental health.</div>
<div class="note">eyebrow (11px·0.18em·700) → H2 (800·−0.015em) → lede paragraph. Used above every section heading.</div>
</body></html>
