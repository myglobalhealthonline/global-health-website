<!doctype html><html><head><meta charset="utf-8"><title>Spacing Scale</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  body { padding: 20px 24px; }
  .stack { display: grid; grid-template-columns: 80px 1fr 80px; gap: 6px 16px; align-items: center; }
  .stack .name { font-family: ui-monospace, monospace; font-size: 11px; color: var(--fg3); }
  .stack .bar { background: #C8E6A0; height: 16px; border-radius: 2px; border-right: 2px solid #1B4D3E; }
  .stack .px { font-family: ui-monospace, monospace; font-size: 11px; color: var(--fg2); text-align: right; }
</style>
<div class="stack">
  <span class="name">--s-1</span><div class="bar" style="width: 4px"></div><span class="px">4px</span>
  <span class="name">--s-2</span><div class="bar" style="width: 8px"></div><span class="px">8px</span>
  <span class="name">--s-3</span><div class="bar" style="width: 12px"></div><span class="px">12px</span>
  <span class="name">--s-4</span><div class="bar" style="width: 16px"></div><span class="px">16px</span>
  <span class="name">--s-6</span><div class="bar" style="width: 24px"></div><span class="px">24px</span>
  <span class="name">--s-8</span><div class="bar" style="width: 32px"></div><span class="px">32px</span>
  <span class="name">--s-12</span><div class="bar" style="width: 48px"></div><span class="px">48px</span>
  <span class="name">--s-16</span><div class="bar" style="width: 64px"></div><span class="px">64px</span>
  <span class="name">--s-28</span><div class="bar" style="width: 112px"></div><span class="px">112px • section</span>
</div>
</body></html>
