# Railway — for services with Root Directory = `frontend` (isolated deploy).
# Full repo is cloned, but only this folder is the build context: no ../pnpm-lock.yaml.
# CI=true makes pnpm treat the lockfile as frozen; unset for this install.
[build]
buildCommand = "sh -c 'unset CI; pnpm install && pnpm run build'"

[deploy]
startCommand = "pnpm run start"
