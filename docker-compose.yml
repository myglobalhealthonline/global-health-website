# Local PostgreSQL for Next.js Server Actions + Prisma.
# Usage from repo root:
#   docker compose up -d
# Connection string (already set in backend/.env and frontend/.env.local):
#   postgresql://postgres:postgres@localhost:5433/global_health
# Run: pnpm db:migrate && pnpm db:seed

services:
  postgres:
    image: postgres:16-alpine
    container_name: global-health-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: global_health
    ports:
      # Map to 5433 on host because another Postgres is already on 5432.
      - "5433:5432"
    volumes:
      - global_health_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d global_health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  global_health_pg:
